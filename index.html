<!DOCTYPE html>
<html lang="pt-BR">
<head>
<link rel="manifest" href="./manifest.json">
<meta name="theme-color" content="#000000">
<meta charset="UTF-8">
<title>Gerador de QR Code</title>
<style>
    body { 
        font-family: Arial, sans-serif; 
        text-align: center; 
        margin-top: 30px; 
        background-color: #f5f5f5; 
    }

    #qrcode { 
        margin: 20px auto; 
        display: inline-block; 
        background: white; 
        padding: 20px; 
        border-radius: 10px; 
        box-shadow: 0 0 15px rgba(0,0,0,0.2); 
    }

    #nome { 
        margin-top: 10px; 
        font-weight: bold; 
        font-size: 22px; 
    }

    input[type="text"], input[type="file"] {
        padding: 10px;
        margin: 5px;
        font-size: 16px;
        border-radius: 6px;
        border: 1px solid #ccc;
        width: 300px;
    }

    button {
        padding: 12px 25px;
        margin: 5px;
        font-size: 16px;
        font-weight: bold;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        transition: all 0.3s ease;
        color: #fff;
        background: linear-gradient(135deg, #6a11cb, #2575fc);
        box-shadow: 0 5px 15px rgba(0,0,0,0.2);
    }

    button:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 20px rgba(0,0,0,0.3);
    }

    button:active {
        transform: translateY(1px);
        box-shadow: 0 4px 10px rgba(0,0,0,0.2);
    }

    @media(max-width: 600px) {
        input[type="text"], input[type="file"] {
            width: 90%;
        }
    }
</style>
</head>
<body>

<h1>Gerador de QR Code</h1>

<input type="text" id="link" placeholder="Digite o link"><br>
<input type="text" id="nomeInput" placeholder="Digite o nome (opcional)"><br>
<input type="file" id="logoInput" accept="image/*"><br>

<button onclick="gerarQRCode()">Gerar QR Code</button>
<button onclick="baixarQRCode()">Baixar JPG</button>
<button onclick="compartilharQRCode()">Compartilhar</button>

<div id="qrcode"></div>
<div id="nome"></div>

<script src="https://cdn.jsdelivr.net/npm/qrcodejs/qrcode.min.js"></script>
<script>
let canvasQR;

function gerarQRCode() {
    const link = document.getElementById('link').value;
    const nome = document.getElementById('nomeInput').value;
    const logoInput = document.getElementById('logoInput').files[0];

    if (!link) { alert("Por favor, insira um link!"); return; }

    document.getElementById('qrcode').innerHTML = "";
    document.getElementById('nome').innerText = nome;

    const qr = new QRCode(document.getElementById('qrcode'), {
        text: link,
        width: 400,
        height: 400,
        colorDark: "#000000",
        colorLight: "#ffffff",
        correctLevel: QRCode.CorrectLevel.H
    });

    setTimeout(() => {
        canvasQR = document.querySelector("#qrcode canvas");

        if (logoInput) {
            const reader = new FileReader();
            reader.onload = function(e) {
                const img = new Image();
                img.src = e.target.result;

                img.onload = function() {
                    const ctx = canvasQR.getContext("2d");
                    const logoSize = canvasQR.width / 4;
                    ctx.drawImage(img, (canvasQR.width - logoSize)/2, (canvasQR.height - logoSize)/2, logoSize, logoSize);
                }
            }
            reader.readAsDataURL(logoInput);
        }
    }, 200);
}

function baixarQRCode() {
    if (!canvasQR) { alert("Gere o QR Code primeiro!"); return; }
    const link = document.createElement('a');
    link.href = canvasQR.toDataURL("image/jpeg");
    link.download = "qr_code.jpg";
    link.click();
}

function compartilharQRCode() {
    if (!canvasQR) { alert("Gere o QR Code primeiro!"); return; }
    if (navigator.canShare && navigator.canShare({ files: [] })) {
        canvasQR.toBlob(blob => {
            const file = new File([blob], "qr_code.jpg", { type: "image/jpeg" });
            navigator.share({
                files: [file],
                title: 'QR Code',
                text: 'Confira este QR Code'
            }).catch(err => alert("Erro ao compartilhar: " + err));
        }, 'image/jpeg');
    } else {
        alert("Compartilhamento não suportado neste navegador. Use o botão de download.");
    }
}
</script>
<button id="btnInstall" style="display:none;">📲 Instalar App</button>
<script>
let deferredPrompt;
const btnInstall = document.getElementById("btnInstall");
window.addEventListener("beforeinstallprompt", (e) => {
  e.preventDefault();
  deferredPrompt = e;
  btnInstall.style.display = "block"; // mostra o botão
});

btnInstall.addEventListener("click", async () => {
  if (deferredPrompt) {
    deferredPrompt.prompt();
    const { outcome } = await deferredPrompt.userChoice;
    console.log("Resultado da instalação:", outcome);
    deferredPrompt = null;
    btnInstall.style.display = "none";
  }
});

// Registrar o Service Worker
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("sw.js");
}
</script>

</body>
</html>
